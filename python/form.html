<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Simple HTML Form (Normal Tags Only)</title>
</head>
<body>
  <h1>Registration Form</h1>

  <!-- Only normal HTML form tags, no CSS, no <div> -->
  <form action="/submit" method="POST" enctype="multipart/form-data" autocomplete="on">
      <legend>Personal Information</legend>

      <label for="fullname">Full Name:</label>
      <input type="text" id="fullname" name="fullname" required>
      <br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      <br>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" minlength="6" required>
      <br>

      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone">
      <br>

      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob">
      <br>

      <label for="photo">Profile Photo:</label>
      <input type="file" id="photo" name="photo" accept="image/*">
      <br>
   
      <legend>Preferences</legend>

      Gender:
      <input type="radio" id="female" name="gender" value="female" required>
      <label for="female">Female</label>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">Male</label>
      <input type="radio" id="other" name="gender" value="other">
      <label for="other">Other</label>
      <br>

      Interests:
      <input type="checkbox" id="coding" name="interests" value="coding">
      <label for="coding">Coding</label>
      <input type="checkbox" id="music" name="interests" value="music">
      <label for="music">Music</label>
      <input type="checkbox" id="sports" name="interests" value="sports">
      <label for="sports">Sports</label>
      <br>

      <label for="country">Country:</label>
      <select id="country" name="country">
        <option value="">-- Select --</option>
        <option value="IN">India</option>
        <option value="US">United States</option>
        <option value="UK">United Kingdom</option>
        <option value="CA">Canada</option>
      </select>
      <br>

      <label for="skills">Skills (hold Ctrl to select multiple):</label>
      <select id="skills" name="skills" multiple size="4">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="js">JavaScript</option>
        <option value="python">Python</option>
      </select>
      <br>

      <label for="website">Website:</label>
      <input type="url" id="website" name="website" placeholder="https://example.com">
      <br>

      <!-- <label for="experience">Experience (Years):</label>
      <input type="number" id="experience" name="experience" min="0" max="50">
      <br> --> 
<!-- 
      <label for="color">Favorite Color:</label>
      <input type="color" id="color" name="color">
      <br> -->

      <!-- <label for="city">City (with suggestions):</label>
      <input list="cities" id="city" name="city">
      <datalist id="cities">
        <option value="Lucknow">
        <option value="Delhi">
        <option value="Mumbai">
        <option value="Kolkata">
      </datalist> -->
      <br>

      <label for="about">About You:</label>
      <textarea id="about" name="about" rows="4" cols="40" placeholder="Write something..."></textarea>
      <br>
    

    <fieldset>
      <legend>Terms</legend>
      <input type="checkbox" id="terms" name="terms" required>
      <label for="terms">I agree to the terms and conditions.</label>
    </fieldset>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
  </form>
</body>
</html>
